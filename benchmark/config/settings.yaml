judge:
  model: claude-sonnet-4-6-20250514
  evaluations_per_response: 3
  variance_threshold: 1.0
  language: en

execution:
  timeout_seconds: 30
  sandbox: true

translation:
  model: claude-haiku-4-5-20251001
  timeout_seconds: 6
