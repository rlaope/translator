id: TC-API-007
category: api_usage
difficulty: medium
tags: [stripe, payments, webhook, python, integration]

prompts:
  en: |
    Implement a Stripe payment integration in Python with the following components:

    1. A `PaymentService` class using the `stripe` Python SDK:
       - `create_payment_intent(amount_cents: int, currency: str, metadata: dict) -> dict`: Creates a PaymentIntent and returns `{client_secret, payment_intent_id}`
       - `confirm_payment(payment_intent_id: str) -> dict`: Retrieves and returns payment intent status
       - `create_customer(email: str, name: str) -> str`: Creates a Stripe Customer and returns customer_id
       - `attach_payment_method(customer_id: str, payment_method_id: str) -> None`: Attaches a payment method to a customer

    2. A FastAPI webhook endpoint `POST /stripe/webhook` that:
       - Verifies the Stripe webhook signature using `stripe.Webhook.construct_event()`
       - Handles `payment_intent.succeeded` event: logs the payment_intent ID and amount
       - Handles `payment_intent.payment_failed` event: logs the failure reason
       - Returns HTTP 400 on signature verification failure
       - Returns HTTP 200 `{"status": "ok"}` on success

    Use `STRIPE_SECRET_KEY` and `STRIPE_WEBHOOK_SECRET` environment variables.
  ko: |
    다음 구성 요소를 사용하여 Python에서 Stripe 결제 통합을 구현하세요:

    1. `stripe` Python SDK를 사용하는 `PaymentService` 클래스:
       - `create_payment_intent(amount_cents: int, currency: str, metadata: dict) -> dict`: PaymentIntent를 생성하고 `{client_secret, payment_intent_id}` 반환
       - `confirm_payment(payment_intent_id: str) -> dict`: 결제 인텐트를 조회하고 상태 반환
       - `create_customer(email: str, name: str) -> str`: Stripe 고객을 생성하고 customer_id 반환
       - `attach_payment_method(customer_id: str, payment_method_id: str) -> None`: 결제 수단을 고객에 연결

    2. 다음을 수행하는 FastAPI 웹훅 엔드포인트 `POST /stripe/webhook`:
       - `stripe.Webhook.construct_event()`를 사용하여 Stripe 웹훅 서명 검증
       - `payment_intent.succeeded` 이벤트 처리: payment_intent ID와 금액 로깅
       - `payment_intent.payment_failed` 이벤트 처리: 실패 이유 로깅
       - 서명 검증 실패 시 HTTP 400 반환
       - 성공 시 HTTP 200 `{"status": "ok"}` 반환

    `STRIPE_SECRET_KEY`와 `STRIPE_WEBHOOK_SECRET` 환경 변수를 사용하세요.
  ja: |
    以下のコンポーネントを使用してPythonでStripe決済統合を実装してください:

    1. `stripe` Python SDKを使用する`PaymentService`クラス:
       - `create_payment_intent(amount_cents: int, currency: str, metadata: dict) -> dict`: PaymentIntentを作成し`{client_secret, payment_intent_id}`を返す
       - `confirm_payment(payment_intent_id: str) -> dict`: 支払いインテントを取得してステータスを返す
       - `create_customer(email: str, name: str) -> str`: Stripe顧客を作成してcustomer_idを返す
       - `attach_payment_method(customer_id: str, payment_method_id: str) -> None`: 顧客に支払い方法を関連付ける

    2. 以下を行うFastAPIウェブフックエンドポイント`POST /stripe/webhook`:
       - `stripe.Webhook.construct_event()`を使用してStripeウェブフック署名を検証
       - `payment_intent.succeeded`イベントを処理: payment_intent IDと金額をログ
       - `payment_intent.payment_failed`イベントを処理: 失敗理由をログ
       - 署名検証失敗時にHTTP 400を返す
       - 成功時にHTTP 200 `{"status": "ok"}`を返す

    `STRIPE_SECRET_KEY`と`STRIPE_WEBHOOK_SECRET`環境変数を使用してください。

validation:
  type: llm_judge
  criteria:
    - "Sets stripe.api_key from STRIPE_SECRET_KEY environment variable"
    - "create_payment_intent calls stripe.PaymentIntent.create() with amount, currency, metadata"
    - "Returns client_secret and payment_intent.id from create_payment_intent"
    - "Webhook endpoint reads raw request body for signature verification"
    - "Uses stripe.Webhook.construct_event() with the webhook secret"
    - "Returns HTTP 400 on ValueError or stripe.error.SignatureVerificationError"
    - "Handles payment_intent.succeeded and payment_intent.payment_failed event types"
  scoring_notes: "Critical: webhook must use raw body (not parsed JSON) for signature verification. Deduct if parsed body is used. Deduct if environment variables are not used."
