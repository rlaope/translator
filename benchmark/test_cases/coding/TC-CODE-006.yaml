id: TC-CODE-006
category: coding
difficulty: medium
tags: [arrays, intervals, sorting, merging, greedy]

prompts:
  en: |
    Write a Python function `merge_intervals(intervals)` that takes a list of intervals `[[start1, end1], [start2, end2], ...]` and merges all overlapping intervals, returning a list of non-overlapping intervals sorted by start time.

    Two intervals overlap if one starts before or when the other ends (i.e., [1,3] and [3,5] overlap and should be merged into [1,5]).

    Requirements:
    - Handle an empty list (return [])
    - Handle a single interval
    - Intervals may be given in any order
    - Return intervals sorted by start value
  ko: |
    구간 목록 `[[start1, end1], [start2, end2], ...]`을 받아 겹치는 모든 구간을 병합하고, 시작 시간 순으로 정렬된 겹치지 않는 구간 목록을 반환하는 Python 함수 `merge_intervals(intervals)`를 작성하세요.

    두 구간은 한 구간이 다른 구간이 끝나기 전 또는 끝날 때 시작하면 겹칩니다(예: [1,3]과 [3,5]는 겹치므로 [1,5]로 병합해야 함).

    요구사항:
    - 빈 리스트 처리 ([] 반환)
    - 단일 구간 처리
    - 구간은 임의의 순서로 주어질 수 있음
    - 시작 값을 기준으로 정렬된 구간을 반환
  ja: |
    区間のリスト`[[start1, end1], [start2, end2], ...]`を受け取り、重複するすべての区間をマージして、開始時刻でソートされた重複しない区間のリストを返すPython関数`merge_intervals(intervals)`を実装してください。

    2つの区間は、一方が他方の終了前または終了時に開始する場合に重複します（つまり、[1,3]と[3,5]は重複し、[1,5]にマージされるべきです）。

    要件:
    - 空のリストを処理する（[]を返す）
    - 単一の区間を処理する
    - 区間は任意の順序で与えられる可能性がある
    - 開始値でソートされた区間を返す

validation:
  type: code_execution
  language: python
  test_cases:
    - input: "merge_intervals([[1,3],[2,6],[8,10],[15,18]])"
      expected: "[[1, 6], [8, 10], [15, 18]]"
    - input: "merge_intervals([[1,4],[4,5]])"
      expected: "[[1, 5]]"
    - input: "merge_intervals([[1,4],[2,3]])"
      expected: "[[1, 4]]"
    - input: "merge_intervals([])"
      expected: "[]"
    - input: "merge_intervals([[5,10],[1,3],[2,6]])"
      expected: "[[1, 6], [5, 10]]"
  timeout_seconds: 30
